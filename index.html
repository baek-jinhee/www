<!DOCTYPE html>

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Jinhee Baek</title>
    <link rel="stylesheet" href="style.css" />

      rel="stylesheet"
      href="components/music-player/music-player.css"
    />
    <style>
      @keyframes chibi-bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      .hero-chibi {
        animation: chibi-bounce 2s ease-in-out infinite;
      }

      @media screen and (max-width: 768px) {
        .hero-chibi {
          display: none !important;
        }
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"

      data-website-id="4499a817-1c30-4e0c-a1c2-dc2eb4d58821"
    ></script>

            <div class="hero-intro">

              </div>
            </div>
          </div>

              alt="Chibi character"

    <!-- Music Player -->
    <div id="music-player-widget"></div>

    <script src="components/navbar/navbar.js"></script>
    <script src="components/music-player/music-player.js"></script>
    <script>
      const playlist = [
        {
          title: "Love Cherry Motion",
          artist: "Choerry",
          url: "assets/music/lovechoerrymotion.opus",
          albumArt: "assets/music/lcm.avif",
        },
      ];
      const player = new MusicPlayer();
      player.setSongs(playlist);
    </script>

    <!-- Match hero-image2 height to hero-card on desktop -->
    <script>
      function matchRightImageHeight() {
        const card = document.querySelector(".hero-card");
        const image2 = document.querySelector(".hero-image2");
        if (!card || !image2) return;

        if (window.innerWidth > 768) {
          image2.style.height = card.offsetHeight + "px";
        } else {
          image2.style.height = "";
        }
      }

      // Run after all images have loaded so heights are accurate
      window.addEventListener("load", function () {
        matchRightImageHeight();
        document.querySelector(".hero").classList.add("loaded");
      });
      window.addEventListener("resize", matchRightImageHeight);
    </script>

    <script src="components/sparkle/sparkle.js"></script>
  </body>
</html>
